<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Máy Phụ</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <style>
        body { background: #1a1a1a; color: white; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        #local-video { width: 100%; max-width: 400px; border-radius: 20px; border: 4px solid #444; object-fit: cover; }
        .input-group { margin: 20px 0; }
        input { padding: 12px; border-radius: 8px; border: none; width: 150px; }
        button { padding: 12px 20px; border-radius: 8px; border: none; background: #28a745; color: white; cursor: pointer; }
    </style>
</head>
<body>
    <h2>Máy Phụ</h2>
    <video id="local-video" autoplay playsinline muted></video>
    
    <div class="input-group">
        <input type="text" id="admin-id" placeholder="Nhập ID 6 số">
        <button onclick="startConnection()">Kết nối</button>
    </div>

    <script>
        const peer = new Peer();
        let localStream, conn;

        async function startConnection() {
            const adminId = document.getElementById('admin-id').value;
            localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            document.getElementById('local-video').srcObject = localStream;
            conn = peer.connect(adminId);
            peer.call(adminId, localStream);

            conn.on('data', (data) => {
                if (data.type === 'cmd') {
                    const v = localStream.getVideoTracks()[0];
                    const a = localStream.getAudioTracks()[0];
                    if (data.val === 'toggle-cam') v.enabled = !v.enabled;
                    if (data.val === 'toggle-mic') a.enabled = !a.enabled;
                    if (data.val === 'disconnect') window.location.reload();
                }
            });
        }
    </script>
</body>
</html>
