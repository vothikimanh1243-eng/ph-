<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Máy Phụ Panel</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #1a1a1a; color: white; display: flex; flex-direction: column; align-items: center; padding: 15px; }
        #local-video { width: 100%; max-width: 360px; border-radius: 12px; border: 3px solid #444; object-fit: cover; }
        .status-bar { margin: 10px 0; display: flex; gap: 10px; }
        .led { padding: 5px 10px; border-radius: 15px; font-size: 0.85rem; font-weight: bold; }
        .led.on { background: #1e4620; color: #4caf50; border: 1px solid #4caf50; }
        .led.off { background: #4a1c1c; color: #f44336; border: 1px solid #f44336; }
        .connect-box { margin-bottom: 15px; }
        input[type="text"] { padding: 10px; border-radius: 6px; border: none; width: 120px; text-align: center; }
        button { padding: 10px 15px; border-radius: 6px; border: none; background: #28a745; color: white; font-weight: bold; cursor: pointer; }
        
        .chat-panel { width: 100%; max-width: 360px; height: 250px; background: #222; border: 1px solid #333; border-radius: 12px; display: flex; flex-direction: column; margin-top: 15px; overflow: hidden; }
        .chat-messages { flex: 1; padding: 10px; overflow-y: auto; display: flex; flex-direction: column; gap: 5px; font-size: 0.9rem; }
        .msg { padding: 6px 10px; border-radius: 6px; max-width: 80%; }
        .msg.admin { background: #333; align-self: flex-start; }
        .msg.phu { background: #007bff; align-self: flex-end; }
        .chat-input-group { display: flex; padding: 8px; background: #111; gap: 5px; }
        .chat-input-group input { flex: 1; padding: 8px; border-radius: 4px; border: none; background: #2a2a2a; color: white; }
    </style>
</head>
<body>

    <h3>Máy Phụ</h3>
    <div class="connect-box">
        <input type="text" id="admin-id" placeholder="ID Admin">
        <button onclick="startConnection()">Kết nối</button>
    </div>

    <video id="local-video" autoplay playsinline muted></video>

    <div class="status-bar">
        <span id="local-led-cam" class="led off">🔴 Cam Tắt</span>
        <span id="local-led-mic" class="led off">🔴 Mic Tắt</span>
    </div>

    <div class="chat-panel">
        <div id="chat-box" class="chat-messages"></div>
        <div class="chat-input-group">
            <input type="text" id="chat-input" placeholder="Chat với Admin..." onkeypress="if(event.key==='Enter') sendMsg()">
            <button onclick="sendMsg()">Gửi</button>
        </div>
    </div>

    <script>
        const peer = new Peer();
        let localStream, conn;

        async function startConnection() {
            const adminId = document.getElementById('admin-id').value;
            if(!adminId) return alert("Nhập ID!");

            localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            document.getElementById('local-video').srcObject = localStream;

            conn = peer.connect(adminId);
            peer.call(adminId, localStream);

            conn.on('open', () => {
                sendStatus(); // Gửi cấu hình bật tắt ban đầu ngay khi thông tuyến dữ liệu
            });

            conn.on('data', (data) => {
                if (data.type === 'cmd') {
                    const v = localStream.getVideoTracks()[0];
                    const a = localStream.getAudioTracks()[0];
                    if (data.val === 'toggle-cam') v.enabled = !v.enabled;
                    if (data.val === 'toggle-mic') a.enabled = !a.enabled;
                    if (data.val === 'disconnect') { window.location.reload(); return; }
                    sendStatus(); // Cập nhật lại sau khi thực hiện lệnh
                }
                if (data.type === 'chat') appendMsg('admin', data.val);
            });
        }

        function sendStatus() {
            if (!conn) return;
            const camOn = localStream.getVideoTracks()[0].enabled;
            const micOn = localStream.getAudioTracks()[0].enabled;
            
            // Gửi dữ liệu về Admin
            conn.send({ type: 'status', cam: camOn, mic: micOn });
            
            // Cập nhật LED tại chỗ cho Máy Phụ xem
            document.getElementById('local-led-cam').className = `led ${camOn ? 'on' : 'off'}`;
            document.getElementById('local-led-cam').innerText = camOn ? '🟢 Cam Bật' : '🔴 Cam Tắt';
            document.getElementById('local-led-mic').className = `led ${micOn ? 'on' : 'off'}`;
            document.getElementById('local-led-mic').innerText = micOn ? '🟢 Mic Bật' : '🔴 Mic Tắt';
        }

        function sendMsg() {
            const input = document.getElementById('chat-input');
            if(!input.value.trim() || !conn) return;
            conn.send({type: 'chat', val: input.value});
            appendMsg('phu', input.value);
            input.value = '';
        }

        function appendMsg(sender, text) {
            const box = document.getElementById('chat-box');
            box.innerHTML += `<div class="msg ${sender}">${text}</div>`;
            box.scrollTop = box.scrollHeight;
        }
    </script>
</body>
</html>
