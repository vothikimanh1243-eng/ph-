<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Client Device - WebRTC Stream</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <style>
        :root { --bg: #0b0f19; --panel: #111827; --border: #1f2937; --accent: #3b82f6; --on: #10b981; --off: #ef4444; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: #f9fafb; font-family: system-ui, -apple-system, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; width: 100%; max-width: 1200px; }
        .card { background: var(--panel); border: 1px solid var(--border); border-radius: 16px; padding: 20px; display: flex; flex-direction: column; gap: 15px; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3); }
        .video-box { position: relative; width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 12px; overflow: hidden; border: 1px solid var(--border); }
        video { width: 100%; height: 100%; object-fit: cover; }
        .video-label { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); padding: 4px 10px; border-radius: 6px; font-size: 0.8rem; font-weight: 500; }
        .controls { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        button { padding: 10px; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; transition: all 0.2s; background: #374151; color: white; font-size: 0.85rem; }
        button:hover { filter: brightness(1.2); }
        .btn-primary { background: var(--accent); }
        .led-group { display: flex; gap: 10px; }
        .led { padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; }
        .led.on { background: rgba(16, 185, 129, 0.2); color: var(--on); border: 1px solid var(--on); }
        .led.off { background: rgba(239, 68, 68, 0.2); color: var(--off); border: 1px solid var(--off); }
        .chat-box { height: 160px; overflow-y: auto; background: #07090e; border: 1px solid var(--border); border-radius: 8px; padding: 10px; font-size: 0.85rem; display: flex; flex-direction: column; gap: 6px; }
        .chat-input-group { display: flex; gap: 10px; }
        input { flex: 1; background: #07090e; border: 1px solid var(--border); border-radius: 8px; padding: 10px; color: white; outline: none; }
        input:focus { border-color: var(--accent); }
        .connect-box { display: flex; gap: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <!-- Panel Máy Phụ -->
        <div class="card">
            <h2>📱 Máy Phụ (Client)</h2>
            <div class="connect-box">
                <input id="admin-id" placeholder="Nhập ID Admin...">
                <button class="btn-primary" onclick="startConnection()">Kết Nối</button>
            </div>
            
            <div class="video-box">
                <span class="video-label">Camera Của Bạn (Local)</span>
                <video id="local-video" autoplay playsinline muted></video>
            </div>
            
            <div class="led-group">
                <span id="led-cam" class="led on">Cam: Bật</span>
                <span id="led-mic" class="led on">Mic: Bật</span>
            </div>

            <div class="controls">
                <button onclick="toggleCam()">📷 Cam</button>
                <button onclick="toggleMic()">🎙️ Mic</button>
                <button onclick="swapCam()">🔄 Đổi Cam</button>
            </div>
        </div>

        <!-- Panel Màn Hình Admin & Chat -->
        <div class="card">
            <h2>🖥️ Màn Hình Admin</h2>
            <div class="video-box">
                <span class="video-label">Camera Admin (Remote)</span>
                <video id="remote-video" autoplay playsinline></video>
            </div>
            
            <div style="height: 42px;"></div> <!-- Giữ cân đối layout -->

            <div class="chat-box" id="chat-box"></div>
            <div class="chat-input-group">
                <input id="chat-input" placeholder="Nhập tin nhắn..." onkeypress="if(event.key==='Enter') sendMsg()">
                <button class="btn-primary" onclick="sendMsg()">Gửi</button>
            </div>
        </div>
    </div>

    <script>
        const peer = new Peer();
        let conn, localStream, camMode = 'user';

        // Khởi tạo camera ban đầu cho máy phụ
        async function initStream() {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: camMode }, 
                    audio: true 
                });
                document.getElementById('local-video').srcObject = localStream;
            } catch (err) {
                alert("Vui lòng cấp quyền Camera/Mic!");
            }
        }
        initStream();

        async function startConnection() {
            const adminId = document.getElementById('admin-id').value.trim();
            if(!adminId) return alert("Vui lòng nhập ID Admin!");

            // Kết nối Data Channel
            conn = peer.connect(adminId);
            setupConnEvents();

            // Gọi Video Call sang Admin
            const call = peer.call(adminId, localStream);
            call.on('stream', stream => {
                document.getElementById('remote-video').srcObject = stream;
            });
            
            alert("Đã kết nối thành công!");
        }

        // Lắng nghe cuộc gọi ngược lại từ Admin (nếu có)
        peer.on('call', call => {
            call.answer(localStream);
            call.on('stream', stream => {
                document.getElementById('remote-video').srcObject = stream;
            });
        });

        function setupConnEvents() {
            conn.on('data', d => {
                if(d.type === 'cmd') {
                    if(d.val === 'toggle-cam') toggleCam();
                    if(d.val === 'toggle-mic') toggleMic();
                    if(d.val === 'swap-cam') swapCam();
                }
                if(d.type === 'chat') {
                    appendChat('Admin', d.val);
                }
            });
        }

        function toggleCam() {
            if(!localStream) return;
            const track = localStream.getVideoTracks()[0];
            track.enabled = !track.enabled;
            updateStatus();
        }

        function toggleMic() {
            if(!localStream) return;
            const track = localStream.getAudioTracks()[0];
            track.enabled = !track.enabled;
            updateStatus();
        }

        async function swapCam() {
            camMode = camMode === 'user' ? 'environment' : 'user';
            localStream.getTracks().forEach(t => t.stop());
            localStream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: camMode }, 
                audio: true 
            });
            document.getElementById('local-video').srcObject = localStream;
            updateStatus();
        }

        function updateStatus() {
            const c = localStream.getVideoTracks()[0].enabled;
            const m = localStream.getAudioTracks()[0].enabled;
            
            document.getElementById('led-cam').className = `led ${c ? 'on' : 'off'}`;
            document.getElementById('led-cam').innerText = c ? 'Cam: Bật' : 'Cam: Tắt';
            
            document.getElementById('led-mic').className = `led ${m ? 'on' : 'off'}`;
            document.getElementById('led-mic').innerText = m ? 'Mic: Bật' : 'Mic: Tắt';

            if(conn && conn.open) {
                conn.send({ type: 'status', cam: c, mic: m });
            }
        }

        function sendMsg() {
            const input = document.getElementById('chat-input');
            if(!input.value.trim() || !conn) return;
            conn.send({ type: 'chat', val: input.value });
            appendChat('Tôi', input.value);
            input.value = '';
        }

        function appendChat(sender, msg) {
            const box = document.getElementById('chat-box');
            box.innerHTML += `<div><b>${sender}:</b> ${msg}</div>`;
            box.scrollTop = box.scrollHeight;
        }
    </script>
</body>
</html>
