<!DOCTYPE html>
<html>
<head>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <style>
        #remote-video { width: 640px; height: 360px; background: black; transition: 0.3s; }
    </style>
</head>
<body>
    <h2>Admin - ID: <span id="my-id">...</span></h2>
    <video id="remote-video" autoplay playsinline></video>
    
    <div class="controls">
        <button onclick="sendCmd('toggle-cam')">📷 Bật/Tắt Cam</button>
        <button onclick="sendCmd('toggle-mic')">🎙️ Mic</button>
        <button onclick="toggleLayout()">📱/💻 Đổi Giao Diện</button>
        <button onclick="sendCmd('disconnect')" style="color:red;">❌ Ngắt</button>
    </div>

    <script>
        const peer = new Peer();
        let conn;
        peer.on('open', (id) => document.getElementById('my-id').innerText = id);

        peer.on('call', (call) => {
            call.answer();
            call.on('stream', (s) => document.getElementById('remote-video').srcObject = s);
        });

        peer.on('connection', (c) => { conn = c; });

        function sendCmd(cmd) { if(conn) conn.send({type: 'cmd', val: cmd}); }

        function toggleLayout() {
            const v = document.getElementById('remote-video');
            if (v.style.width === '360px') {
                v.style.width = '640px'; v.style.height = '360px';
            } else {
                v.style.width = '360px'; v.style.height = '640px';
            }
        }
    </script>
</body>
</html>
