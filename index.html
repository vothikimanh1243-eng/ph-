<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <style>
        /* Sử dụng cùng style với Admin ở trên */
        body { background: #0f0f0f; color: white; display: flex; flex-direction: column; align-items: center; padding: 20px; font-family: sans-serif; }
        .panel { background: #1a1a1a; padding: 20px; border-radius: 20px; width: 400px; }
        video { width: 100%; border-radius: 15px; }
        button { padding: 12px; width: 100%; border: none; border-radius: 12px; background: #28a745; color: white; margin-top: 10px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="panel">
        <h2>Máy Phụ</h2>
        <input id="admin-id" placeholder="ID Admin" style="padding: 10px; width: 90%; border-radius: 10px;">
        <button onclick="startConnection()">Kết Nối</button>
        <video id="local-video" autoplay playsinline muted></video>
        <button class="danger" onclick="window.location.reload()">❌ Ngắt Kết Nối</button>
    </div>
    <script>
        const peer = new Peer();
        let conn, localStream;
        async function startConnection() {
            const id = document.getElementById('admin-id').value;
            localStream = await navigator.mediaDevices.getUserMedia({video: true, audio: true});
            document.getElementById('local-video').srcObject = localStream;
            conn = peer.connect(id);
            peer.call(id, localStream);
            conn.on('data', (data) => {
                if(data.val === 'disconnect') window.location.reload();
                if(data.type === 'cmd') {
                    // Logic thực hiện lệnh (Cam/Mic/Swap...)
                }
            });
        }
    </script>
</body>
</html>
