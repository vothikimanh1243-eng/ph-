<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <style>
        body { background: #111; color: white; text-align: center; }
        /* Sử dụng object-fit: cover để hình ảnh tự lấp đầy khung hình mà không bị méo */
        #local-video { 
            width: 100%; 
            max-width: 400px; 
            border: 3px solid #444; 
            border-radius: 10px; 
            background: #000;
            object-fit: cover; 
            aspect-ratio: auto;
        }
    </style>
</head>
<body>
    <h3>Máy Phụ: Truyền hình ảnh</h3>
    <video id="local-video" autoplay playsinline muted></video>
    
    <div style="margin-top: 20px;">
        <input type="text" id="admin-id" placeholder="ID Admin (6 số)">
        <button onclick="startConnection()">Kết nối</button>
    </div>

    <script>
        const peer = new Peer();
        let localStream, conn;

        async function startConnection() {
            const adminId = document.getElementById('admin-id').value;
            if (!adminId) return alert("Nhập ID!");

            try {
                localStream = await navigator.mediaDevices.getUserMedia({ 
                    video: true, 
                    audio: true 
                });
                document.getElementById('local-video').srcObject = localStream;

                conn = peer.connect(adminId);
                peer.call(adminId, localStream);

                // Nhận lệnh từ Admin
                conn.on('data', (data) => {
                    if (data.type === 'cmd') {
                        const v = localStream.getVideoTracks()[0];
                        const a = localStream.getAudioTracks()[0];
                        
                        if (data.val === 'toggle-cam') v.enabled = !v.enabled;
                        if (data.val === 'toggle-mic') a.enabled = !a.enabled;
                        if (data.val === 'disconnect') window.location.reload();
                    }
                });
            } catch (err) { alert("Lỗi Camera: " + err.message); }
        }
    </script>
</body>
</html>
